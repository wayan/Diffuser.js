<script>
    function bounding(points){
        return [ Math.min, Math.max ].map(
            function(f){
                return points.reduce(
                    function(a, b){
                        return a.map(function(x,i){ return f(x, b[i]); }); 
                    }
                );
            }
        );
    }

jQuery(function($){
    console.log( [ 27 ].reduce(function(){}));
    console.log( bounding([[1,1], [2,3], [-3,0], [17,4]]) );
});
